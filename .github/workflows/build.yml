# GitHub 云端自动打包 Windows 安装包

name: Build Windows

on:
  # 手动：GitHub 仓库 → Actions → Build Windows → Run workflow
  workflow_dispatch:
  # 打 tag 时自动构建（如 git tag v1.0.1 && git push origin v1.0.1）
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build Windows package
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          PIP_TRUSTED_HOST: pypi.org
        run: build\build_windows.bat

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: TazhengTong-windows
          path: dist/TazhengTong_windows_v*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
