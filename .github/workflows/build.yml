# GitHub 云端自动打包 Windows / macOS / Linux 安装包

name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build Windows package
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          PIP_TRUSTED_HOST: pypi.org
        run: cmd /c build\build_windows.bat

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: TazhengTong-windows
          path: dist/TazhengTong_windows_v*.zip
          if-no-files-found: error

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build macOS package
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          PIP_TRUSTED_HOST: pypi.org
        run: bash build/build_mac.sh

      - name: Upload macOS zip
        uses: actions/upload-artifact@v4
        with:
          name: TazhengTong-macos
          path: dist/TazhengTong_mac_v*.zip
          if-no-files-found: error

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libfontconfig1 \
            libdbus-1-3 \
            zip

      - name: Build Linux package
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          PIP_TRUSTED_HOST: pypi.org
        run: bash build/build_linux.sh

      - name: Upload Linux zip
        uses: actions/upload-artifact@v4
        with:
          name: TazhengTong-linux
          path: dist/TazhengTong_linux_v*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
